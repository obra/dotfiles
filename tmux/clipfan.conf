# clipfan tmux integration — sourced from ~/.tmux.conf:
#     source-file ~/git/dotfiles/tmux/clipfan.conf
#
# Rebinds copy-mode yanks to pipe the selection through `clipfan copy`, which
# injects it into the local clipfan daemon (syncing it to the whole fleet) and
# also emits OSC 52 to the client tty as a fallback for terminals that consume
# it (Blink/iTerm/Kitty/Ghostty; Apple Terminal ignores it).
#
# Absolute $HOME/.local/bin/clipfan is deliberate: tmux runs copy-pipe commands
# in a non-login shell whose PATH usually omits ~/.local/bin.
#
# No secrets live here. The shared key is host-local in ~/.config/clipfan/config.json.

# Bound in BOTH copy-mode tables so it works whether mode-keys resolves to vi
# or emacs — mouse-drag selection fires MouseDragEnd1Pane in whichever table is
# active, and a default (non-clipfan) binding in the other table would otherwise
# silently copy to the tmux buffer only.

# vi copy-mode (yank keys + mouse drag)
bind -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "$HOME/.local/bin/clipfan copy --osc52 #{client_tty}"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "$HOME/.local/bin/clipfan copy --osc52 #{client_tty}"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "$HOME/.local/bin/clipfan copy --osc52 #{client_tty}"

# emacs copy-mode (M-w yank + mouse drag)
bind -T copy-mode M-w   send-keys -X copy-pipe-and-cancel "$HOME/.local/bin/clipfan copy --osc52 #{client_tty}"
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "$HOME/.local/bin/clipfan copy --osc52 #{client_tty}"

# Catch selections that never enter tmux copy-mode. Full-screen TUIs that grab
# the mouse (e.g. Claude Code) do their own selection and push it into the tmux
# paste buffer via `set-buffer`, so the copy-mode bindings above never fire.
# The after-set-buffer hook pipes any such buffer change through clipfan too.
#
# Loop-safe: the clipfan daemon writes received clips back with `load-buffer`
# (fires the separate after-load-buffer hook, not this one), and clipfan dedups
# identical content by hash — so this hook does not re-trigger on the writeback.
set-hook -g after-set-buffer 'run-shell "tmux show-buffer | $HOME/.local/bin/clipfan copy"'
